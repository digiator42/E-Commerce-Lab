name: Ecommerce Lab QC Suite

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]

jobs:
  automation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: master_ecom_test
          POSTGRES_USER: cloud_user
          POSTGRES_PASSWORD: cloud_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: master_ecom_test
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven Executable
        run: chmod +x mvnw

      - name: Run Development Tests
        env:
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: root_password
          POSTGRES_USERNAME: cloud_user
          POSTGRES_PASSWORD: cloud_password

          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          REMEMBER_ME_KEY: ${{ secrets.REMEMBER_ME_KEY }}
          
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          export SPRING_PROFILES_ACTIVE=cicd
          ./mvnw spring-boot:run & 
          timeout 60s bash -c 'until printf "" 2>>/dev/null >/dev/tcp/127.0.0.1/8080; do sleep 2; done'
          ./mvnw verify -P qc -Ddependency-check.skip=true

      - name: Upload Test Results
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: automation-results
          # Captures both surefire and failsafe reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/QC-Report.html

  deploy-report:
    runs-on: ubuntu-latest
    needs: automation
    if: always()
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: automation-results
          path: target/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
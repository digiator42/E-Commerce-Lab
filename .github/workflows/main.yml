name: Keep Render Alive

on:
  schedule:
    # This runs every 10 minutes, 24/7
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows to run it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Request to Render
        run: |
          curl -I https://e-commerce-lab.onrender.com/api/health

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <style>
        .code-box {
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            letter-spacing: 10px;
            font-weight: bold;
            color: #333;
            border: 2px dashed #ccc;
            margin: 20px 0;
        }

        .warning {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: auto;">
        <h2>Security Verification</h2>
        <p>Your one-time verification code is:</p>
        <div class="code-box" th:text="${code}">123456</div>
        <p>This code will expire in 5 minutes.</p>
        <p class="warning">If you did not request this code, please secure your account or contact support immediately.
        </p>
    </div>
</body>

</html>

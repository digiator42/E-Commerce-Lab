<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <style>
        .container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            border: 1px solid #eee;
            max-width: 600px;
            margin: auto;
        }

        .header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px 5px 0 0;
        }

        .content {
            line-height: 1.6;
            color: #444;
            padding: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Commerce Lab!</h1>
        </div>
        <div class="content">
            <p>Hi <span th:text="${name}">User</span>,</p>
            <p>We're thrilled to have you join our community. Your account is now active and ready to go!</p>
            <p>Ready to find something awesome?</p>
            <a href="http://localhost:8080/" class="btn">Start Shopping</a>
            <p>If you have any questions, just reply to this email.</p>
            <p>Best,<br />The Commerce Lab Team</p>
        </div>
    </div>
</body>

</html>

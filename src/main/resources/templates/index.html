<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce Store | SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">GEMINI<span class="text-gray-700">SHOP</span></h1>
            <div class="space-x-6 flex items-center">
                <a href="/" onclick="router(event)" class="hover:text-blue-500 font-medium">Home</a>
                <a href="/products" onclick="router(event)" class="hover:text-blue-500 font-medium">Store</a>

                <div class="relative cursor-pointer" onclick="toggleCartDrawer()">
                    <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    <span id="cart-count"
                        class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </div>

                <div id="user-area">...</div>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-6xl mx-auto px-4 py-8 min-h-screen">
    </main>

    <div id="cart-overlay" onclick="toggleCartDrawer()"
        class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity duration-300 opacity-0"></div>

    <div id="cart-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-bold">Your Cart</h2>
            <button onclick="toggleCartDrawer()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div id="cart-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <p class="text-gray-500 text-center mt-10">Your cart is empty.</p>
        </div>

        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between mb-4 font-bold text-lg">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="checkout()"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-black transition shadow-lg">
                Checkout
            </button>
        </div>
    </div>

    <footer class="bg-white border-t mt-12 py-8 text-center text-gray-500">
        <p>&copy; 2026 Commerce E-Commerce Lab. Built with Spring Boot & Vanilla JS.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => router());
        window.addEventListener('popstate', () => router());
    </script>
</body>

</html>

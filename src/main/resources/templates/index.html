<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce Store | SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">MASTER<span class="text-gray-700">SHOP</span>
            </h1>
            <div class="space-x-6 flex items-center">
                <a href="/" onclick="router(event)" class="hover:text-blue-500 font-medium transition">Home</a>
                <a href="/products" onclick="router(event)" class="hover:text-blue-500 font-medium transition">Store</a>
                <div id="user-area" class="flex items-center space-x-4">
                    <a href="/login" onclick="router(event)"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-6xl mx-auto px-4 py-8 min-h-screen">
    </main>

    <footer class="bg-white border-t mt-12 py-8 text-center text-gray-500">
        <p>&copy; 2026 Commerce E-Commerce Lab. Built with Spring Boot & Vanilla JS.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => router());
        window.addEventListener('popstate', () => router());
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce Store | SPA</title>
    <base href="/">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lazy-image {
            filter: blur(10px);
            transform: scale(1.05);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .lazy-image.loaded {
            filter: blur(0);
            transform: scale(1);
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }

            100% {
                background-position: 1000px 0;
            }
        }

        .animate-pulse {
            background: linear-gradient(to right, #f0f0f0 8%, #f8f8f8 18%, #f0f0f0 33%);
            background-size: 1000px 100%;
            animation: shimmer 0.1s infinite linear;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .wishlist-heart.active {
            animation: heartBeat 0.5s ease-in-out;
            color: #ef4444;
            fill: #ef4444;
        }

        .spinner-small {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        .form-group.error input,
        .form-group.error select,
        .form-group.error textarea {
            border-color: #ef4444;
            background-color: #fef2f2;
        }
        
        .form-group.error input:focus,
        .form-group.error select:focus,
        .form-group.error textarea:focus {
            ring-color: #ef4444;
            border-color: #ef4444;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-40">

                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                            <span id="wishlist-count-desktop"
                                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
                                0

                        </button>
                    </div>

                    <!-- Cart Icon -->
                    <div class="relative">
                        <button onclick="window.cartManager.toggle()"
                            class="p-2 text-gray-700 hover:text-blue-600 transition-colors relative group">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                            </svg>

                            LOGIN

                        <a href="/register" onclick="window.router.route(event)"
                            class="bg-gray-100 text-gray-900 px-5 py-2.5 rounded-lg text-sm font-extrabold tracking-wide hover:bg-gray-200 transition-colors">
                            REGISTER

                    </div>

                    <!-- User Menu (shown when authenticated) -->

                        <button id="user-menu-button" class="flex items-center space-x-2 focus:outline-none group">

                                class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-black text-sm shadow-md group-hover:shadow-lg transition-shadow">
                                <span id="user-initials">U</span>
                            </div>
                            <span id="user-name-display"
                                class="text-sm font-black text-gray-900 max-w-[100px] truncate tracking-wide">User</span>
                            <svg class="w-4 h-4 text-gray-600 group-hover:text-gray-900 transition-colors" fill="none"
                                stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>

                        <!-- Dropdown Menu -->
                        <div id="user-dropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-50">
                            <a href="/profile" onclick="window.router.route(event)"
                                class="block px-4 py-2.5 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-3 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                                    </svg>
                                    My Profile
                                </span>
                            </a>
                            <a href="/orders" onclick="window.router.route(event)"
                                class="block px-4 py-2.5 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-3 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                    </svg>
                                    My Orders
                                </span>
                            </a>
                            <div class="border-t border-gray-100 my-2"></div>
                            <button onclick="window.authManager.logout()"

                                    </svg>

                    </div>
                </div>

                <!-- Mobile menu button & icons -->

                    <!-- Wishlist Icon (Mobile) -->

                        <button onclick="window.wishlistManager.toggleDrawer()"
                            class="p-2 text-gray-700 hover:text-red-500 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>

                    <!-- Cart Icon (Mobile) -->

                        <button onclick="window.cartManager.toggle()" class="p-2 text-gray-700">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                            </svg>
                            <span id="cart-count-mobile"
                                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
                                0
                            </span>

        </div>

        <!-- Mobile Menu Dropdown -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 px-6 py-4 space-y-3">
            <a href="/" onclick="window.router.route(event)"
                class="block py-3 text-gray-900 hover:text-blue-600 font-extrabold tracking-wide border-b border-gray-50 flex items-center">
                <svg class="w-5 h-5 mr-3 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                HOME

            <a href="/products" onclick="window.router.route(event)"
                class="block py-3 text-gray-900 hover:text-blue-600 font-extrabold tracking-wide border-b border-gray-50 flex items-center">
                <svg class="w-5 h-5 mr-3 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                STORE
            </a>

            <!-- Mobile Auth Section -->
            <div id="mobile-auth-buttons" class="space-y-2 pt-2">
                <a href="/login" onclick="window.router.route(event)"
                    class="block py-3 text-gray-900 hover:text-blue-600 font-extrabold tracking-wide flex items-center">
                    <svg class="w-5 h-5 mr-3 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />

                    <svg class="w-5 h-5 mr-3 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                    </svg>
                    REGISTER

            <!-- Mobile User Menu -->

                    <svg class="w-5 h-5 mr-3 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                    </svg>
                    Hello, <span id="mobile-user-name" class="ml-1 text-blue-600"></span>
                </div>
                <a href="/profile" onclick="window.router.route(event)"
                    class="block py-3 text-gray-700 hover:text-blue-600 font-bold flex items-center">
                    <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    My Profile
                </a>
                <a href="/orders" onclick="window.router.route(event)"
                    class="block py-3 text-gray-700 hover:text-blue-600 font-bold flex items-center">
                    <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    My Orders
                </a>
                <a href="#" onclick="window.wishlistManager.toggleDrawer()"
                    class="block py-3 text-gray-700 hover:text-blue-600 font-bold flex items-center">
                    <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    Wishlist
                </a>

                    SIGN OUT

    <main id="content" class="max-w-5xl mx-auto px-4 py-8 min-h-screen"></main>

    <div id="cart-overlay" onclick="window.cartManager.toggle()"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity duration-300 opacity-0"></div>
    <div id="cart-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-bold">Your Cart</h2>
            <button onclick="window.cartManager.toggle()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <div id="cart-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <p class="text-gray-500 text-center mt-10">Your cart is empty.</p>
        </div>
        <div class="p-6 border-t bg-gray-50 space-y-3">
            <div class="flex justify-between font-bold text-lg">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" onclick="window.orderManager.goToCheckout(event)"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow-lg">
                Checkout
            </button>
            <button onclick="window.cartManager.clear()"
                class="w-full text-gray-400 hover:text-red-500 text-sm font-medium transition py-1">
                Clear Shopping Cart
            </button>
        </div>
    </div>

    <!-- Wishlist Overlay -->
    <div id="wishlist-overlay" onclick="window.wishlistManager.toggleDrawer()"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Wishlist Drawer -->
    <div id="wishlist-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gradient-to-r from-red-50 to-white">
            <h2 class="text-xl font-bold flex items-center">
                <svg class="w-6 h-6 text-red-500 mr-2" fill="currentColor" stroke="none" viewBox="0 0 24 24">
                    <path
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                My Wishlist
            </h2>
            <button onclick="window.wishlistManager.toggleDrawer()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div id="wishlist-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <div class="text-center py-10">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                <p class="text-gray-500 font-medium">Loading your wishlist...</p>
            </div>
        </div>

        <div class="p-6 border-t bg-gray-50">
            <button onclick="window.wishlistManager.toggleDrawer()"
                class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">
                Continue Shopping
            </button>
        </div>
    </div>

    <footer class="bg-white border-t mt-12 py-8 text-center text-gray-500">
        <p>&copy; 2026 Commerce E-Commerce Lab. Built with Spring Boot & Vanilla JS.</p>
    </footer>

    <script type="module" src="/js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce Store | SPA</title>
    <base href="/">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .wishlist-heart.active {
            animation: heartBeat 0.5s ease-in-out;
            color: #ef4444;
            fill: #ef4444;
        }

        .spinner-small {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <h1 class="text-2xl font-bold text-blue-600">
                        MASTER<span class="text-gray-700">SHOP</span>
                    </h1>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex md:items-center md:space-x-6">
                    <!-- Main Nav Links -->
                    <a href="/" onclick="window.router.route(event)"
                        class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                        Home
                    </a>
                    <a href="/products" onclick="window.router.route(event)"
                        class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                        Store
                    </a>

                    <!-- Wishlist Icon -->
                    <div class="relative">
                        <button onclick="window.wishlistManager.toggleDrawer()"
                            class="p-2 text-gray-600 hover:text-red-500 transition-colors relative group">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                                </path>
                            </svg>
                            <span id="wishlist-count-desktop"
                                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
                                0
                            </span>
                        </button>
                    </div>

                    <!-- Cart Icon -->
                    <div class="relative">
                        <button onclick="window.cartManager.toggle()"
                            class="p-2 text-gray-600 hover:text-blue-600 transition-colors relative group">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                            </svg>
                            <span id="cart-count-desktop"
                                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
                                0
                            </span>
                        </button>
                    </div>

                    <!-- Auth Buttons (shown when NOT authenticated) -->
                    <div id="desktop-auth-buttons" class="flex items-center space-x-3">
                        <a href="/login" onclick="window.router.route(event)"
                            class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
                            Login
                        </a>
                        <a href="/register" onclick="window.router.route(event)"
                            class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors">
                            Register
                        </a>
                    </div>

                    <div id="language-switcher-container">
                        <!-- Will be populated by JavaScript -->
                    </div>

                    <!-- User Menu (shown when authenticated) -->
                    <div id="desktop-user-menu" class="hidden relative">
                        <button id="user-menu-button" class="flex items-center space-x-2 focus:outline-none group">
                            <div
                                class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md group-hover:shadow-lg transition-shadow">
                                <span id="user-initials">U</span>
                            </div>
                            <span id="user-name-display"
                                class="text-sm font-medium text-gray-700 max-w-[100px] truncate">User</span>
                            <svg class="w-4 h-4 text-gray-500 group-hover:text-gray-700 transition-colors" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <!-- Dropdown Menu -->
                        <div id="user-dropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-50">
                            <a href="/profile" onclick="window.router.route(event)"
                                class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                                        </path>
                                    </svg>
                                    My Profile
                                </span>
                            </a>
                            <a href="/orders" onclick="window.router.route(event)"
                                class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                                    </svg>
                                    My Orders
                                </span>
                            </a>
                            <div class="border-t border-gray-100 my-2"></div>
                            <button onclick="window.authManager.logout()"
                                class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                        </path>
                                    </svg>
                                    Sign Out
                                </span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="flex items-center space-x-4 md:hidden">
                    <!-- Cart Icon (Mobile) -->
                    <div class="relative">
                        <button onclick="window.wishlistManager.toggleDrawer()"
                            class="p-2 text-gray-600 hover:text-red-500 transition-colors relative group">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                                </path>
                            </svg>
                            <span id="wishlist-count-mobile"
                                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
                                0
                            </span>
                        </button>
                        <button onclick="window.cartManager.toggle()" class="p-2 text-gray-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                            </svg>
                            <span id="cart-count-mobile"
                                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                        </button>
                    </div>

                    <!-- Hamburger -->
                    <button id="mobile-menu-btn" class="text-gray-700 focus:outline-none p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 px-4 py-4 space-y-3">
            <a href="/" onclick="window.router.route(event)"
                class="block py-2 text-gray-700 hover:text-blue-600 font-medium">Home</a>
            <a href="/products" onclick="window.router.route(event)"
                class="block py-2 text-gray-700 hover:text-blue-600 font-medium">Store</a>

            <!-- Mobile Auth Section -->
            <div id="mobile-auth-buttons">
                <a href="/login" onclick="window.router.route(event)"
                    class="block py-2 text-gray-700 hover:text-blue-600 font-medium">Login</a>
                <a href="/register" onclick="window.router.route(event)"
                    class="block py-2 text-gray-700 hover:text-blue-600 font-medium">Register</a>
            </div>

            <!-- Mobile User Menu -->
            <div id="mobile-user-menu" class="hidden">
                <div class="py-2 text-gray-700 font-medium border-b border-gray-100 pb-2">Hello, <span
                        id="mobile-user-name"></span></div>
                <a href="/profile" onclick="window.router.route(event)"
                    class="block py-2 text-gray-600 hover:text-blue-600 pl-4">👤 My Profile</a>
                <a href="/orders" onclick="window.router.route(event)"
                    class="block py-2 text-gray-600 hover:text-blue-600 pl-4">📦 My Orders</a>
                <a href="#" onclick="window.wishlistManager.toggleDrawer()"
                    class="block py-2 text-gray-600 hover:text-blue-600 pl-4">❤️ Wishlist</a>
                <button onclick="window.authManager.logout()"
                    class="block w-full text-left py-2 text-red-600 hover:text-red-800 font-medium pl-4">🚪 Sign
                    Out</button>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-6xl mx-auto px-4 py-8 min-h-screen"></main>

    <div id="cart-overlay" onclick="window.cartManager.toggle()"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity duration-300 opacity-0"></div>
    <div id="cart-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-bold">Your Cart</h2>
            <button onclick="window.cartManager.toggle()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <div id="cart-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <p class="text-gray-500 text-center mt-10">Your cart is empty.</p>
        </div>
        <div class="p-6 border-t bg-gray-50 space-y-3">
            <div class="flex justify-between font-bold text-lg">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" onclick="window.orderManager.checkout(event)"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow-lg">
                Checkout
            </button>
            <button onclick="window.cartManager.clear()"
                class="w-full text-gray-400 hover:text-red-500 text-sm font-medium transition py-1">
                Clear Shopping Cart
            </button>
        </div>
    </div>

    <!-- Wishlist Overlay -->
    <div id="wishlist-overlay" onclick="window.wishlistManager.toggleDrawer()"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Wishlist Drawer -->
    <div id="wishlist-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gradient-to-r from-red-50 to-white">
            <h2 class="text-xl font-bold flex items-center">
                <svg class="w-6 h-6 text-red-500 mr-2" fill="currentColor" stroke="none" viewBox="0 0 24 24">
                    <path
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                My Wishlist
            </h2>
            <button onclick="window.wishlistManager.toggleDrawer()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div id="wishlist-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <div class="text-center py-10">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                <p class="text-gray-500 font-medium">Loading your wishlist...</p>
            </div>
        </div>

        <div class="p-6 border-t bg-gray-50">
            <button onclick="window.wishlistManager.toggleDrawer()"
                class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">
                Continue Shopping
            </button>
        </div>
    </div>

    <footer class="bg-white border-t mt-12 py-8 text-center text-gray-500">
        <p>&copy; 2026 Commerce E-Commerce Lab. Built with Spring Boot & Vanilla JS.</p>
    </footer>

    <script type="module" src="/js/app.js"></script>
</body>

</html>

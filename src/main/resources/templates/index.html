<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce Store | SPA</title>
    <base href="/">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .wishlist-heart.active {
            animation: heartBeat 0.5s ease-in-out;
            color: #ef4444;
            fill: #ef4444;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <!-- Logo -->
            <h1 class="text-2xl font-bold text-blue-600">
                MASTER<span class="text-gray-700">SHOP</span>
            </h1>

            <!-- Hamburger button (visible on small screens) -->
            <button id="menu-btn" class="md:hidden text-gray-700 focus:outline-none">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <!-- Menu items -->
            <div id="menu" class="hidden md:flex space-x-6 items-center">
                <a href="/" onclick="window.router.route(event)" class="hover:text-blue-500 font-medium">Home</a>
                <a href="/products" onclick="window.router.route(event)"
                    class="hover:text-blue-500 font-medium">Store</a>
                <div class="flex items-center space-x-4">
                    <a href="/orders" onclick="window.router.route(event)"
                        class="text-gray-600 hover:text-blue-600 font-medium">My Orders</a>
                    <span class="text-gray-300">|</span>
                    <button id="logout-btn" onclick="window.authManager.logout()"
                        class="text-red-500 hover:text-red-700 font-medium">Logout</button>
                </div>
                <a href="/profile" onclick="window.router.route(event)"
                    class="text-gray-600 hover:text-blue-600 font-medium">
                    Profile
                </a>
                <a href="/login" id="login-btn" onclick="window.router.route(event)"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium">Login</a>
                <div class="relative cursor-pointer ml-4" onclick="window.wishlistManager.toggleDrawer()">
                    <svg class="w-7 h-7 text-gray-700 hover:text-red-500 transition-colors" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                        </path>
                    </svg>
                    <span id="wishlist-count"
                        class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </div>
                <div class="relative cursor-pointer" onclick="window.cartManager.toggle()">
                    <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    <span id="cart-count"
                        class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="user-area">...</div>
            </div>
        </div>

        <!-- Mobile dropdown -->
        <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 space-y-4 ease-in-out transition">
            <a href="/" onclick="window.router.route(event)" class="block hover:text-blue-500 font-medium">Home</a>
            <a href="/products" onclick="window.router.route(event)"
                class="block hover:text-blue-500 font-medium">Store</a>
            <a href="/orders" onclick="window.router.route(event)"
                class="block text-gray-600 hover:text-blue-600 font-medium">My Orders</a>
            <button id="logout-btn-mobile" onclick="window.authManager.logout()"
                class="block text-red-500 hover:text-red-700 font-medium">Logout</button>
            <a href="/profile" onclick="window.router.route(event)"
                class="text-gray-600 hover:text-blue-600 font-medium">
                Profile
            </a>
            <div class="relative cursor-pointer ml-4" onclick="window.wishlistManager.toggleDrawer()">
                <svg class="w-7 h-7 text-gray-700 hover:text-red-500 transition-colors" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                <span id="wishlist-count"
                    class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </div>
            <a href="/login" id="login-btn-mobile" onclick="window.router.route(event)"
                class="block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium">Login</a>
        </div>
    </nav>

    <main id="content" class="max-w-6xl mx-auto px-4 py-8 min-h-screen"></main>

    <div id="cart-overlay" onclick="window.cartManager.toggle()"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity duration-300 opacity-0"></div>
    <div id="cart-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-bold">Your Cart</h2>
            <button onclick="window.cartManager.toggle()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <div id="cart-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <p class="text-gray-500 text-center mt-10">Your cart is empty.</p>
        </div>
        <div class="p-6 border-t bg-gray-50 space-y-3">
            <div class="flex justify-between font-bold text-lg">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" onclick="window.orderManager.checkout(event)"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow-lg">
                Checkout
            </button>
            <button onclick="window.cartManager.clear()"
                class="w-full text-gray-400 hover:text-red-500 text-sm font-medium transition py-1">
                Clear Shopping Cart
            </button>
        </div>
    </div>

    <!-- Wishlist Overlay -->
    <div id="wishlist-overlay" onclick="window.wishlistManager.toggleDrawer()"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Wishlist Drawer -->
    <div id="wishlist-drawer"
        class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gradient-to-r from-red-50 to-white">
            <h2 class="text-xl font-bold flex items-center">
                <svg class="w-6 h-6 text-red-500 mr-2" fill="currentColor" stroke="none" viewBox="0 0 24 24">
                    <path
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                My Wishlist
            </h2>
            <button onclick="window.wishlistManager.toggleDrawer()" class="text-gray-500 hover:text-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div id="wishlist-items-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            <div class="text-center py-10">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4 animate-pulse" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                <p class="text-gray-500 font-medium">Loading your wishlist...</p>
            </div>
        </div>

        <div class="p-6 border-t bg-gray-50">
            <button onclick="window.wishlistManager.toggleDrawer()"
                class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">
                Continue Shopping
            </button>
        </div>
    </div>

    <footer class="bg-white border-t mt-12 py-8 text-center text-gray-500">
        <p>&copy; 2026 Commerce E-Commerce Lab. Built with Spring Boot & Vanilla JS.</p>
    </footer>

    <script type="module" src="/js/app.js"></script>
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>

</html>

<div class="max-w-lg mx-auto py-2">
    <div class="bg-white p-10 rounded-3xl shadow-2xl border border-gray-50">
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Welcome Back</h2>
            <p class="text-gray-500 mt-2">Please enter your details</p>
        </div>

        <!-- Mock Test Users Toggle -->
        <div class="mb-6">
            <button type="button" onclick="window.authManager.toggleMockUsers()" 
                class="w-full flex items-center justify-between p-3 bg-purple-50 hover:bg-purple-100 rounded-xl transition group">
                <span class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <span class="font-medium text-purple-700">Mock Test Users</span>
                </span>
                <svg class="w-5 h-5 text-purple-500 transform transition-transform duration-300" id="mock-users-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            
            <!-- Mock Users Dropdown -->
            <div id="mock-users-dropdown" class="hidden mt-2 p-3 bg-purple-50/50 rounded-xl border border-purple-100 space-y-2">
                <p class="text-xs text-purple-600 mb-2 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    This is for testing purposes
                </p>
                <div id="testing-emails-container" class="grid grid-cols-1 gap-1">
                    <!-- This will be populated -->
                     {{testing_users}}
                </div>
            </div>
        </div>

        <!-- Login Form -->
        <form onsubmit="window.authManager.handleLogin(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                <input name="email" type="email" id="login-email" required placeholder="name@company.com"
                    class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:border-blue-500 focus:ring-0 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input name="password" type="password" id="login-password" required placeholder="••••••••"
                    class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:border-blue-500 focus:ring-0 outline-none transition">
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="rememberMe" name="rememberMe"  name="rememberMe"
                        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="rememberMe" class="ml-2 text-sm text-gray-600">Remember me</label>
                </div>
                <a href="/forgot-password" onclick="window.router.route(event)"
                    class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                    Forgot password?
                </a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="login-btn"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 hover:shadow-blue-200 shadow-xl transition transform active:scale-95">
                Sign In
            </button>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-400">Or continue with</span>
                </div>
            </div>

            <!-- Google Sign In Button -->
            <button type="button" onclick="window.authManager.googleLogin()"
                class="w-full bg-white border-2 border-gray-200 text-gray-700 py-4 rounded-xl font-bold hover:bg-gray-50 transition transform hover:scale-[1.02] flex items-center justify-center space-x-3 group">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span>Sign in with Google</span>
            </button>
        </form>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-500 mt-8 pt-6 border-t border-gray-100">
            Don't have an account?
            <a href="/register" onclick="window.router.route(event)"
                class="text-blue-600 hover:text-blue-800 font-medium inline-flex items-center group">
                Create account
                <svg class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>
        </p>
    </div>

    <div class="text-center mt-8">
        <div class="flex justify-center space-x-4 text-sm text-gray-400">
            <span>🔒 Secure login</span>
            <span>•</span>
            <span>⚡ 2-factor auth</span>
            <span>•</span>
            <span>🛡️ Privacy protected</span>
        </div>
    </div>
</div>

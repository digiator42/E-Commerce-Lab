<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-100 rounded-full mb-4">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Reset Password</h2>
            <p class="text-gray-500">Choose how you'd like to verify your identity</p>
        </div>

        <!-- Email Verification Tab -->
        <div id="tab-email-reset-content" class="space-y-6">
            <!-- Email Form -->
            <form id="forgot-password-form" onsubmit="window.authManager.handleForgotPassword(event)" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                        placeholder="name@company.com">
                    <p class="text-xs text-gray-400 mt-2">
                        You'll receive an email with a reset link if an account exists.
                    </p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="forgot-password-btn"
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition transform hover:scale-[1.02] shadow-lg">
                    Send Reset Instructions
                </button>
            </form>
        </div>      

        <!-- Success Message (Hidden by default) -->
        <div id="reset-success-message" class="hidden bg-green-50 border border-green-200 rounded-xl p-6 text-center">
            <svg class="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-xl font-bold text-green-800 mb-2" id="success-title">Check Your Email</h3>
            <p class="text-green-700 mb-4" id="success-message">
                If an account exists for <span id="sent-email" class="font-semibold"></span>,
                you'll receive a password reset link shortly.
            </p>
            <p class="text-sm text-green-600" id="success-footer">
                Didn't receive it? Check your spam folder or
                <button onclick="window.authManager.resetForm()" class="text-blue-600 hover:text-blue-800 font-medium">
                    try again
                </button>
            </p>
        </div>

        <!-- Back to Login -->
        <div class="text-center pt-4 border-t border-gray-100">
            <a href="/login" onclick="window.router.route(event)"
                class="text-sm text-gray-500 hover:text-gray-700 flex items-center justify-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>
    </div>
</div>

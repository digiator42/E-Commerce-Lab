<div class="max-w-2xl mx-auto py-12">
    <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-xl">
        <h2 class="text-3xl font-black mb-6">Create New Product</h2>

        <form id="add-product-form" onsubmit="saveProduct(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-400 uppercase mb-2">Product Name</label>
                <input type="text" name="name" required
                    class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-400 uppercase mb-2">Price ($)</label>
                    <input type="number" step="0.01" name="price" required
                        class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-400 uppercase mb-2">Category</label>
                    <select name="categoryName"
                        class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500">
                        {{categoryOptions}}
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-400 uppercase mb-2">Description</label>
                <textarea name="description" rows="4" required
                    class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="flex space-x-4 pt-4">
                <button type="submit"
                    class="flex-grow bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-black transition">
                    Save Product
                </button>
                <button type="button" onclick="window.history.back()"
                    class="px-8 py-4 rounded-xl font-bold bg-gray-100 text-gray-500">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

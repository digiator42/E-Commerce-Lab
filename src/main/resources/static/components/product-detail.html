<div class="max-w-5xl mx-auto py-12 px-4">
    <button onclick="window.history.back()" class="flex items-center text-gray-500 hover:text-blue-600 mb-8 transition">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Results
    </button>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
        <div
            class="aspect-square bg-gray-100 rounded-3xl flex items-center justify-center text-gray-300 overflow-hidden">
            <img src="{{imageSrc}}?w=100&q=30" srcset="{{imageSrc}}?w=200&q=70 200w,
                    {{imageSrc}}?w=300&q=80 300w,
                    {{imageSrc}}?w=400&q=90 400w" sizes="(max-width: 600px) 300px, 600px" alt="{{name}}" loading="lazy"
                class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
        </div>

        <div class="space-y-6">
            <span class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                {{category}}
            </span>
            <h1 class="text-5xl font-black text-gray-900 leading-tight">{{name}}</h1>
            <p class="text-3xl font-light text-gray-400">$<span class="text-gray-900 font-bold">{{price}}</span></p>
            <p class="text-sm font-medium {{stock > 0 ? 'text-green-600' : 'text-red-600'}}">
                {{stock}}
            </p>
            <div class="py-6 border-y border-gray-100">
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-3">Description</h3>
                <p class="text-gray-600 leading-relaxed text-lg">{{description}}</p>
            </div>

            <div class="can-review-container mt-16 border-t pt-10">
                <h3 class="text-2xl font-black text-gray-900 mb-8">Customer Reviews</h3>

                <div id="review-form-container" class="bg-gray-50 p-6 rounded-3xl mb-10">
                    <h4 class="font-bold mb-4">Leave a Review</h4>
                    <div class="flex space-x-2 mb-4" id="star-rating-input">
                        <button onclick="window.productManager.setRating(1)"
                            class="text-gray-300 text-2xl hover:text-yellow-400">★</button>
                        <button onclick="window.productManager.setRating(2)"
                            class="text-gray-300 text-2xl hover:text-yellow-400">★</button>
                        <button onclick="window.productManager.setRating(3)"
                            class="text-gray-300 text-2xl hover:text-yellow-400">★</button>
                        <button onclick="window.productManager.setRating(4)"
                            class="text-gray-300 text-2xl hover:text-yellow-400">★</button>
                        <button onclick="window.productManager.setRating(5)"
                            class="text-gray-300 text-2xl hover:text-yellow-400">★</button>
                    </div>
                    <textarea id="review-comment"
                        class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 mb-4"
                        placeholder="Share your thoughts..."></textarea>
                    <button onclick="window.productManager.submitReview({{id}})"
                        class="bg-black text-white px-6 py-2 rounded-xl font-bold">Post Review</button>
                </div>
            </div>

            <button onclick="window.cartManager.addItem({{id}})"
                class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-black transition shadow-xl shadow-blue-100">
                Add to Cart
            </button>
            <button onclick="window.wishlistManager.toggleItem(event, {{id}})"
                class="flex-1 border-2 border-gray-200 text-gray-700 py-6 rounded-xl font-bold hover:border-red-500 hover:text-red-500 transition flex items-center justify-center gap-2"
                data-product-id="{{id}}">
                <svg class="w-5 h-5 wishlist-heart-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
                Add to Wishlist
            </button>
        </div>
    </div>
    <div id="reviews-list" class="space-y-6 mt-12 w-full">
        {{reviewsHtml}}
    </div>
</div>

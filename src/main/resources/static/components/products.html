<div class="flex flex-col lg:flex-row gap-8">
    <aside class="w-full lg:w-72 flex-shrink-0">
        <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm sticky top-24 space-y-6">
            <!-- Categories Section -->
            <div>
                <h3
                    class="font-black text-gray-900 mb-4 uppercase tracking-widest text-xs flex items-center justify-between">
                    <span>Categories</span>
                    <button onclick="window.productManager.clearCategoryFilters()"
                        class="text-xs text-blue-600 hover:text-blue-800 font-medium hidden" id="clear-categories">
                        Clear
                    </button>
                </h3>
                <div id="category-list" class="space-y-2 min-h-60 overflow-y-auto pr-2">
                </div>
            </div>

            <!-- Price Range Filter -->
            <div class="border-t border-gray-100 pt-4">
                <h3 class="font-black text-gray-900 mb-4 uppercase tracking-widest text-xs">Price Range</h3>
                <div class="space-y-3">
                    <div class="flex items-center space-x-2">
                        <input type="range" id="min-price-range" min="0" max="1000" step="10" value="0"
                            oninput="window.productManager.updatePriceRange()" class="w-full accent-blue-600">
                    </div>
                    <div class="flex items-center space-x-2">
                        <input type="range" id="max-price-range" min="0" max="1000" step="10" value="1000"
                            oninput="window.productManager.updatePriceRange()" class="w-full accent-blue-600">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <div class="flex items-center space-x-2">
                            <span class="text-gray-500">Min:</span>
                            <input type="number" id="min-price-input" value="0" min="0" max="1000" step="10"
                                onchange="window.productManager.updatePriceRange()"
                                class="w-20 px-2 py-1 border rounded-lg text-sm">
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-gray-500">Max:</span>
                            <input type="number" id="max-price-input" value="1000" min="0" max="1000" step="10"
                                onchange="window.productManager.updatePriceRange()"
                                class="w-20 px-2 py-1 border rounded-lg text-sm">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Rating Filter -->
            <div class="border-t border-gray-100 pt-4">
                <h3 class="font-black text-gray-900 mb-4 uppercase tracking-widest text-xs">Minimum Rating</h3>
                <div class="space-y-2">
                    <!-- 4 Stars & Up -->
                    <label
                        class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition">
                        <div class="flex items-center space-x-3">
                            <input type="radio" name="rating-filter" value="4"
                                onchange="window.productManager.setRatingFilter(4)"
                                class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex items-center">
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />

                                </svg>
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <span class="text-xs text-gray-500 ml-1">& Up</span>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400" id="rating-count-4">(0)</span>
                    </label>

                    <!-- 3 Stars & Up -->
                    <label
                        class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition">
                        <div class="flex items-center space-x-3">
                            <input type="radio" name="rating-filter" value="3"
                                onchange="window.productManager.setRatingFilter(3)"
                                class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex items-center">
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <span class="text-xs text-gray-500 ml-1">& Up</span>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400" id="rating-count-3">(0)</span>
                    </label>

                    <!-- 2 Stars & Up -->
                    <label
                        class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition">
                        <div class="flex items-center space-x-3">
                            <input type="radio" name="rating-filter" value="2"
                                onchange="window.productManager.setRatingFilter(2)"
                                class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex items-center">
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <span class="text-xs text-gray-500 ml-1">& Up</span>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400" id="rating-count-2">(0)</span>
                    </label>

                    <!-- 1 Star & Up -->
                    <label
                        class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition">
                        <div class="flex items-center space-x-3">
                            <input type="radio" name="rating-filter" value="1"
                                onchange="window.productManager.setRatingFilter(1)"
                                class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex items-center">
                                <svg class="w-4 h-4 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path
                                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <span class="text-xs text-gray-500 ml-1">& Up</span>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400" id="rating-count-1">(0)</span>
                    </label>

                    <!-- All Ratings -->
                    <label
                        class="flex items-center justify-between p-2 rounded-xl hover:bg-gray-50 cursor-pointer transition">
                        <div class="flex items-center space-x-3">
                            <input type="radio" name="rating-filter" value="0"
                                onchange="window.productManager.setRatingFilter(0)"
                                class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" checked>
                            <span class="text-sm text-gray-600">All Ratings</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- In Stock Only -->
            <div class="border-t border-gray-100 pt-4">
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm font-medium text-gray-700">In Stock Only</span>
                    <input type="checkbox" id="in-stock-filter" onchange="window.productManager.toggleInStock()"
                        class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                </label>
            </div>

            <!-- Active Filters -->
            <div class="border-t border-gray-100 pt-4" id="active-filters-container" style="display: none;">
                <h3 class="font-black text-gray-900 mb-3 uppercase tracking-widest text-xs">Active Filters</h3>
                <div id="active-filters" class="flex flex-wrap gap-2">
                </div>
                <button onclick="window.productManager.clearAllFilters()"
                    class="mt-3 text-sm text-red-600 hover:text-red-800 font-medium">
                    Clear All Filters
                </button>
            </div>
        </div>
    </aside>

    <div class="flex-grow space-y-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b pb-6">
            <div>
                <h2 class="text-4xl font-black text-gray-900">Our Collection</h2>
                <p class="text-gray-500 mt-2" id="results-count">Discover quality items curated for you.</p>
            </div>

            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" id="product-search" oninput="window.productManager.handleSearch(event)"
                    placeholder="Search products..."
                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-2xl leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150">
            </div>
            <select id="products-filter" onchange="window.productManager.applySorting(this.value)"
                class="md:w-48 p-2 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="">Sort by</option>
                <option value="price_asc">Price (Low to High)</option>
                <option value="price_desc">Price (High to Low)</option>
                <option value="rating">Top Rated</option>
                <option value="stock">Stock</option>
                <option value="name,asc">Name (A-Z)</option>
            </select>
        </div>

        <div id="product-list-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            {{productList}}
        </div>

        <div class="flex justify-center items-center space-x-4 pt-10 pb-20">
            <button id="prev-btn" onclick="window.productManager.changePage(-1)"
                class="px-4 py-2 border rounded-xl hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed transition">
                Previous
            </button>
            <span id="page-info" class="font-medium text-gray-600 italic">Page 1 of 1</span>
            <button id="next-btn" onclick="window.productManager.changePage(1)"
                class="px-4 py-2 border rounded-xl hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed transition">
                Next
            </button>
        </div>
    </div>
</div>

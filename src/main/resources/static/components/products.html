<div class="space-y-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b pb-6">
        <div>
            <h2 class="text-4xl font-black text-gray-900">Our Collection</h2>
            <p class="text-gray-500 mt-2">Discover quality items curated for you.</p>
        </div>

        <div class="relative w-full md:w-80">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </span>
            <input type="text" id="product-search" oninput="handleSearch(event)" placeholder="Search products..."
                class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-2xl leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150">
        </div>
    </div>

    <div id="product-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {{productList}}
    </div>
</div>

<div class="space-y-8">

    <div class="flex justify-center items-center space-x-4 pt-10 pb-20">
        <button id="prev-btn" onclick="changePage(-1)"
            class="px-4 py-2 border rounded-xl hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed transition">
            Previous
        </button>
        <span id="page-info" class="font-medium text-gray-600 italic">Page 1 of 1</span>
        <button id="next-btn" onclick="changePage(1)"
            class="px-4 py-2 border rounded-xl hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed transition">
            Next
        </button>
    </div>
</div>

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-100 rounded-full mb-4">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Two-Factor Authentication</h2>
            <p class="text-gray-500">Verify your identity to continue</p>
            <p class="text-sm text-gray-400 mt-2" id="user-email-display"></p>
        </div>

        <!-- Tabs for different verification methods -->
        <div class="border-b border-gray-200">
            <div class="flex -mb-px">
                <button onclick="window.authManager.switch2FATab('authenticator')" id="tab-authenticator"
                    class="tab-2fa w-1/2 py-3 text-sm font-medium text-center border-b-2 border-blue-600 text-blue-600">
                    Google Authenticator
                </button>
                <button onclick="window.authManager.switch2FATab('email')" id="tab-email"
                    class="tab-2fa w-1/2 py-3 text-sm font-medium text-center border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    Email Code
                </button>
            </div>
        </div>

        <!-- Google Authenticator Tab -->
        <div id="tab-authenticator-content" class="space-y-6">
            <!-- QR Code Section -->
            <div class="bg-gray-50 p-6 rounded-2xl text-center">
                <h3 class="font-bold text-gray-900 mb-3">Scan QR Code</h3>
                <div id="qr-code-container" class="flex justify-center mb-3">
                    <div class="bg-white p-3 rounded-xl shadow-sm inline-block">
                        <div id="qr-code-loading" class="w-48 h-48 flex items-center justify-center">
                            <div class="spinner-small"></div>
                        </div>
                        <img id="qr-code-image" class="w-48 h-48 hidden" alt="QR Code for Google Authenticator">
                    </div>
                </div>
                <p class="text-xs text-gray-500 mb-2">
                    Scan this QR code with Google Authenticator app
                </p>
                <div class="flex items-center justify-center space-x-2 text-xs">
                    <span class="text-gray-400">Can't scan?</span>
                    <button onclick="window.authManager.showManualCode()"
                        class="text-blue-600 hover:text-blue-800 font-medium">
                        Enter manually
                    </button>
                </div>
            </div>

            <!-- Manual Entry (Hidden by default) -->
            <div id="manual-entry" class="hidden bg-gray-50 p-4 rounded-xl">
                <p class="text-xs font-medium text-gray-700 mb-2">Manual Setup Key:</p>
                <div class="flex items-center space-x-2">
                    <code id="manual-secret"
                        class="flex-1 bg-white px-3 py-2 rounded-lg text-sm font-mono border border-gray-200"></code>
                    <button onclick="window.authManager.copySecret()" class="text-gray-500 hover:text-blue-600 p-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                            </path>
                        </svg>
                    </button>
                </div>
                <p class="text-xs text-gray-400 mt-2">Open Google Authenticator and enter this key manually</p>
            </div>

            <!-- Authenticator Code Input -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700">Enter Code from Authenticator</label>
                <div class="flex space-x-2">
                    <input type="text" id="auth-code" maxlength="6"
                        class="flex-1 px-4 py-3 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        placeholder="000000">
                    <button onclick="window.authManager.verifyTOTP()"
                        class="px-6 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">
                        Verify
                    </button>
                </div>
            </div>
        </div>

        <!-- Email Tab -->
        <div id="tab-email-content" class="hidden space-y-6">
            <!-- Code Input -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Verification Code</label>
                <div class="flex justify-between gap-2 mb-2">
                    <input type="text" maxlength="1"
                        class="email-code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="0" autofocus>
                    <input type="text" maxlength="1"
                        class="email-code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="1">
                    <input type="text" maxlength="1"
                        class="email-code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="2">
                    <input type="text" maxlength="1"
                        class="email-code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="3">
                    <input type="text" maxlength="1"
                        class="email-code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="4">
                    <input type="text" maxlength="1"
                        class="email-code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="5">
                </div>
                <input type="hidden" id="email-code" name="code">

                <!-- Resend Email Code -->
                <div class="flex items-center justify-between mt-4">
                    <button type="button" onclick="window.authManager.resendEmailCode()"
                        class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                        Resend Email Code
                    </button>
                    <span class="text-xs text-gray-400" id="email-timer"></span>
                </div>
            </div>

            <!-- Verify Email Button -->
            <button onclick="window.authManager.verifyEmailCode()"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">
                Verify & Sign In
            </button>
        </div>

        <!-- Back to Login -->
        <div class="text-center pt-4 border-t border-gray-100">
            <a href="/login" onclick="window.router.route(event)"
                class="text-sm text-gray-500 hover:text-gray-700 flex items-center justify-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>
    </div>
</div>

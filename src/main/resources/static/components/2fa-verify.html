<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-100 rounded-full mb-4">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Two-Factor Authentication</h2>
            <p class="text-gray-500">Enter the 6-digit code sent to your email</p>
            <p class="text-sm text-gray-400 mt-2" id="user-email-display"></p>
        </div>

        <!-- 2FA Form -->
        <form id="2fa-verify-form" onsubmit="window.authManager.handle2FAVerification(event)" class="mt-8 space-y-6">
            <!-- Hidden input for email -->
            <input type="hidden" id="2fa-email" name="email">

            <!-- Code Input -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Authentication Code</label>
                <div class="flex justify-between gap-2 mb-2">
                    <input type="text" maxlength="1"
                        class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="0" autofocus>
                    <input type="text" maxlength="1"
                        class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="1">
                    <input type="text" maxlength="1"
                        class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="2">
                    <input type="text" maxlength="1"
                        class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="3">
                    <input type="text" maxlength="1"
                        class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="4">
                    <input type="text" maxlength="1"
                        class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition"
                        data-index="5">
                </div>
                <input type="hidden" id="2fa-code" name="code">
                <p class="text-xs text-gray-400 text-center">Enter the 6-digit code from your email</p>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="verify-btn"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 hover:shadow-blue-200 shadow-xl transition transform active:scale-95">
                Verify & Sign In
            </button>

            <!-- Resend Code -->
            <div class="text-center">
                <button type="button" onclick="window.authManager.resend2FACode()"
                    class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                    Didn't receive code? Resend
                </button>
            </div>

            <!-- Back to Login -->
            <div class="text-center pt-4 border-t border-gray-100">
                <a href="/login" onclick="window.router.route(event)"
                    class="text-sm text-gray-500 hover:text-gray-700 flex items-center justify-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Login
                </a>
            </div>
        </form>

        <!-- Security Note -->
        <div class="text-center text-xs text-gray-400 mt-4">
            <p>🔒 For your security, this code expires in 10 minutes</p>
        </div>
    </div>
</div>

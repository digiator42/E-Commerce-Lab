<div
    class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-2xl transition-all duration-300 relative">
    <!-- Wishlist Heart Icon -->
    <button onclick="event.preventDefault(); window.wishlistManager.toggleItem(event, {{id}})"
        class="absolute top-4 right-4 z-10 bg-white/90 backdrop-blur p-2 rounded-full shadow-md hover:scale-110 transition-transform duration-200">
        <svg data-product-id="{{productId}}" id="wishlist-heart-{{productId}}" class="w-5 h-5 {{wishlistClass}}" fill="{{wishlistFill}}" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
            </path>
        </svg>
    </button>

    <div class="h-56 bg-gray-100 relative overflow-hidden">
        <div class="relative overflow-hidden rounded-2xl mb-4 aspect-square bg-gray-50">
            <a href="/product/{{id}}" onclick="window.router.route(event)"
                class="w-full h-full group-hover:scale-110 transition duration-500">
                <img src="{{imageSrc}}?w=50&q=20" srcset="{{imageSrc}}?w=100&q=30 100w,
                    {{imageSrc}}?w=200&q=70 200w,
                    {{imageSrc}}?w=300&q=85 300w" sizes="(max-width: 640px) 100vw, (max-width: 768px) 50vw, 33vw"
                    alt="{{name}}" loading="lazy"
                    class="w-full h-full object-cover group-hover:scale-110 transition duration-500 lazy-image"
                    onload="this.classList.add('loaded')">
            </a>
        </div>
        <!-- Review Status Badge - Only shown if reviewStatus exists -->
        <div class="review-status-container" style="display: {{reviewStatusDisplay}};">
            <span
                class="absolute top-4 left-4 bg-white/80 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-green-600 shadow-sm">
                {{reviewStatus}}
            </span>
        </div>
        <span
            class="absolute top-4 right-4 bg-white/80 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-blue-600 shadow-sm">
            NEW
        </span>
    </div>
    <div class="p-6">
        <div class="flex items-center justify-between mb-2">
            <h3 class="text-xl font-bold text-gray-800">{{name}}</h3>
            <div class="flex items-center">
                <span class="text-yellow-400 text-sm">{{rating}}</span>
                <span class="text-xs text-gray-400 ml-1">({{reviewCount}})</span>
            </div>
        </div>
        <p class="text-gray-500 text-sm mb-4 line-clamp-2 h-10">{{description}}</p>
        <div class="flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs text-gray-400 uppercase font-bold">Price</span>
                <span class="text-2xl font-black text-gray-900">${{price}}</span>
                <span
                    class="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full font-semibold mt-2">{{category}}</span>
            </div>
            <button onclick="window.cartManager.addItem({{id}})"
                class="bg-blue-600 text-white p-3 rounded-xl hover:bg-black transition-colors duration-300 shadow-lg shadow-blue-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

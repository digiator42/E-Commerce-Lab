<div
    class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-2xl transition-all duration-300">
    <div class="h-56 bg-gray-100 relative overflow-hidden">
        <a href="/product/{{id}}"
            class="absolute inset-0 flex items-center justify-center text-gray-300 hover:text-gray-400 transition-colors">
            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                </path>
            </svg>
        </a>
        <span
            class="absolute top-4 right-4 bg-white/80 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-blue-600 shadow-sm">
            NEW
        </span>
    </div>
    <div class="p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-1">{{name}}</h3>
        <p class="text-gray-500 text-sm mb-6 line-clamp-2 h-10">{{description}}</p>
        <div class="flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs text-gray-400 uppercase font-bold">Price</span>
                <span class="text-2xl font-black text-gray-900">${{price}}</span>
                <span class="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full font-semibold">{{category}}</span>
            </div>
            <button onclick="addToCart({{id}})"
                class="bg-blue-600 text-white p-3 rounded-xl hover:bg-black transition-colors duration-300 shadow-lg shadow-blue-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

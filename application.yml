spring:
  datasource:
    name: commerce-lab
    url: jdbc:postgresql://localhost:5432/master_ecom
    username: $postgres
    password: $password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080